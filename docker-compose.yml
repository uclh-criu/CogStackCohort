services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  medcat:
    build:
      context: ./MedCAT
    container_name: cohorter-medcat
    ports:
      - "3001:3001"
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      MEDCAT_MODEL_PACK: /app/models/medcat_model_pack.zip
    volumes:
      # Keep model locally in MedCAT/models/ (do NOT commit it to GitHub)
      - ./MedCAT/models/medcat_model_pack.zip:/app/models/medcat_model_pack.zip:ro
    restart: unless-stopped

  nl2dsl:
    build:
      context: ./NL2DSL
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        http_proxy: ${http_proxy:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        https_proxy: ${https_proxy:-}
    container_name: cohorter-nl2dsl
    ports:
      - "3002:3002"
    environment:
      LLM_BACKEND: "ollama-chat"
      OLLAMA_CHAT_BASE_URL: "https://dt4h-uclh.uksouth.cloudapp.azure.com:8080/cms/huggingface-llm/ollama"
      OPENAI_BASE_URL: "https://dt4h-uclh.uksouth.cloudapp.azure.com:8080/cms/huggingface-llm/openai/v1"
      OPENAI_API_KEY: "dummy"
      OPENAI_DISABLE_TLS: "true"
      LLM_MODEL: "cms-mistral-nemo-instruct-2407"
      MEDCAT_URL: "http://cohorter-medcat:3001"
      ALLOW_ORIGINS: "*"
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      https_proxy: ${https_proxy:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      http_proxy: ${http_proxy:-}
    depends_on:
      - medcat
    restart: unless-stopped

  webapp:
    build:
      context: ./WebAPP
      args:
        random: "false"   # set to "true" to run gen_random_data.js during build
        HTTP_PROXY: ${HTTP_PROXY:-}
        http_proxy: ${http_proxy:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        https_proxy: ${https_proxy:-}
    container_name: cohorter-webapp
    ports:
      - "7823:3000"
    environment:
      MEDCAT_URL: "http://cohorter-medcat:3001"
      NL2DSL_URL: "http://cohorter-nl2dsl:3002"
    depends_on:
      - medcat
      - nl2dsl
    restart: unless-stopped

volumes:
  ollama:
